  #     - db
  #   networks:
  #     - app-network
  #   volumes:
  #     - ./servers.json:/pgadmin4/servers.json
  #   container_name: "pgadmin"

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  storage_data:
